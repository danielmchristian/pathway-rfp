services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pathway
      POSTGRES_PASSWORD: pathway
      POSTGRES_DB: pathway
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathway -d pathway"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://pathway:pathway@db:5432/pathway
      LOG_LEVEL: INFO
      ENV: dev
      # Secrets pulled from `.env` (next to docker-compose.yml). Each is
      # optional individually but the full pipeline needs them populated.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      USDA_FDC_API_KEY: ${USDA_FDC_API_KEY:-}
      USDA_AMS_API_KEY: ${USDA_AMS_API_KEY:-}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RFP_FROM_EMAIL: ${RFP_FROM_EMAIL:-procurement@getserviceledger.com}
      RFP_DEMO_INBOX: ${RFP_DEMO_INBOX:-daniel@getserviceledger.com}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]

  frontend:
    build:
      context: ./frontend
    environment:
      # Inside the compose network the browser still hits the backend via the
      # host port 8000; for server-side fetches from within the container we
      # use the docker service name.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata:
